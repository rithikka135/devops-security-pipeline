name: DevSecOps Enterprise Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  static-security-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python Core
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting & Security Tools
        run: pip install flake8 bandit

      - name: Run Syntax Quality Lint Verification
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Automated DevSecOps Static Code Analysis (AST scan)
        run: bandit -r ./ml-analysis-engine ./log-generator

  infrastructure-compilation:
    needs: static-security-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose Orchestration Integrity
        run: docker compose config

      - name: Test Build Infrastructure Compilation Layers
        run: docker compose build